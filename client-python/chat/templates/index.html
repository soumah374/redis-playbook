<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat temps réel — Redis HA</title>
  <style>
    :root { --bg:#0f172a; --panel:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text);
           height:100vh; display:flex; flex-direction:column; }
    header { padding:12px 20px; background:var(--panel); display:flex; align-items:center; gap:12px;
             border-bottom:1px solid #334155; }
    header h1 { font-size:16px; margin:0; }
    header .room { color:var(--accent); font-weight:600; }
    header .status { margin-left:auto; font-size:12px; color:var(--muted); }
    header .status.on { color:#4ade80; }
    #messages { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:8px; }
    .msg { max-width:70%; padding:8px 12px; border-radius:10px; background:var(--panel); line-height:1.35; }
    .msg .who { font-weight:600; color:var(--accent); font-size:13px; }
    .msg .text { white-space:pre-wrap; word-break:break-word; }
    .msg .time { font-size:11px; color:var(--muted); margin-top:2px; }
    .msg.mine { align-self:flex-end; background:#1d4ed8; }
    .msg.mine .who { color:#bfdbfe; }
    form { display:flex; gap:8px; padding:12px 20px; background:var(--panel); border-top:1px solid #334155; }
    input { padding:10px 12px; border-radius:8px; border:1px solid #334155; background:#0b1220;
            color:var(--text); font-size:14px; }
    #user { width:140px; }
    #text { flex:1; }
    button { padding:10px 18px; border:none; border-radius:8px; background:var(--accent); color:#0f172a;
             font-weight:600; cursor:pointer; }
    button:hover { background:#7dd3fc; }
  </style>
</head>
<body>
  <header>
    <h1>💬 Chat temps réel — salon <span class="room">#{{ room }}</span></h1>
    <span id="status" class="status">connexion…</span>
  </header>

  <div id="messages"></div>

  <form id="form">
    <input id="user" placeholder="pseudo" autocomplete="off" required>
    <input id="text" placeholder="votre message…" autocomplete="off" required>
    <button type="submit">Envoyer</button>
  </form>

  <script>
    const ROOM = {{ room|tojson }};
    const messagesEl = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const userEl = document.getElementById("user");
    const textEl = document.getElementById("text");

    // Pseudo persistant entre rechargements.
    userEl.value = localStorage.getItem("chat_user") || "user" + Math.floor(Math.random() * 1000);

    function fmtTime(ts) {
      return new Date(ts * 1000).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    }

    function addMessage(m) {
      const div = document.createElement("div");
      div.className = "msg" + (m.user === userEl.value ? " mine" : "");
      div.innerHTML =
        `<div class="who"></div><div class="text"></div><div class="time"></div>`;
      div.querySelector(".who").textContent = m.user;
      div.querySelector(".text").textContent = m.text;
      div.querySelector(".time").textContent = fmtTime(m.ts);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // 1) Charge l'historique récent.
    fetch(`/history?room=${encodeURIComponent(ROOM)}`)
      .then(r => r.json())
      .then(d => d.messages.forEach(addMessage));

    // 2) Abonnement temps réel via SSE.
    const es = new EventSource(`/stream?room=${encodeURIComponent(ROOM)}`);
    es.onopen = () => { statusEl.textContent = "● en ligne"; statusEl.classList.add("on"); };
    es.onerror = () => { statusEl.textContent = "○ reconnexion…"; statusEl.classList.remove("on"); };
    es.onmessage = (e) => addMessage(JSON.parse(e.data));

    // 3) Envoi d'un message.
    document.getElementById("form").addEventListener("submit", (e) => {
      e.preventDefault();
      const user = userEl.value.trim();
      const text = textEl.value.trim();
      if (!text) return;
      localStorage.setItem("chat_user", user);
      fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user, text, room: ROOM }),
      });
      textEl.value = "";
      textEl.focus();
    });
  </script>
</body>
</html>
